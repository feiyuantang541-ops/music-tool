<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能乐谱解析翻译工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .title {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .tool-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 20px;
        }

        .panel h3 {
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-size: 16px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        .result-area {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            min-height: 100px;
            margin-top: 15px;
            white-space: pre-wrap;
            line-height: 1.8;
        }

        .analysis-box {
            background: #fff3cd;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .analysis-box h3 {
            color: #856404;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .tool-box {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎵 智能乐谱解析与翻译工具</h1>

        <div class="tool-box">
            <!-- 五线谱转简谱 -->
            <div class="panel">
                <h3>🎼 五线谱 → 简谱</h3>
                <textarea id="staffInput" placeholder="请输入五线谱音符（格式：C4 D4 E4 F4 G4 A5 B5，支持空格分隔）"></textarea>
                <div class="btn-group">
                    <button onclick="staffToNumber()">开始翻译</button>
                    <button onclick="clearStaff()">清空输入</button>
                </div>
                <div class="result-area" id="staffResult"></div>
            </div>

            <!-- 简谱转五线谱 -->
            <div class="panel">
                <h3>🎹 简谱 → 五线谱</h3>
                <textarea id="numberInput" placeholder="请输入简谱（格式：1 2 3 4 5 6 7，高音：+1 +2，低音：-1 -2）"></textarea>
                <div class="btn-group">
                    <button onclick="numberToStaff()">开始翻译</button>
                    <button onclick="clearNumber()">清空输入</button>
                </div>
                <div class="result-area" id="numberResult"></div>
            </div>
        </div>

        <!-- 音乐分析 -->
        <div class="analysis-box">
            <h3>📊 乐谱智能分析</h3>
            <div class="btn-group">
                <button onclick="analyzeMusic()">分析当前乐谱</button>
            </div>
            <div class="result-area" id="analysisResult"></div>
        </div>
    </div>

    <script>
        // 核心映射表：五线谱音名 ↔ 简谱
        const noteMap = {
            'C3': '-1', 'D3': '-2', 'E3': '-3', 'F3': '-4', 'G3': '-5', 'A3': '-6', 'B3': '-7',
            'C4': '1', 'D4': '2', 'E4': '3', 'F4': '4', 'G4': '5', 'A4': '6', 'B4': '7',
            'C5': '+1', 'D5': '+2', 'E5': '+3', 'F5': '+4', 'G5': '+5', 'A5': '+6', 'B5': '+7'
        };

        // 反向映射：简谱 → 五线谱
        const reverseMap = {};
        for (let k in noteMap) reverseMap[noteMap[k]] = k;

        // ===================== 五线谱转简谱 =====================
        function staffToNumber() {
            let input = document.getElementById('staffInput').value.trim();
            if (!input) {
                alert('请输入五线谱音符！');
                return;
            }
            let notes = input.split(/\s+/);
            let result = notes.map(n => noteMap[n] || n).join(' ');
            document.getElementById('staffResult').textContent = '翻译结果：\n' + result;
        }

        // ===================== 简谱转五线谱 =====================
        function numberToStaff() {
            let input = document.getElementById('numberInput').value.trim();
            if (!input) {
                alert('请输入简谱！');
                return;
            }
            let notes = input.split(/\s+/);
            let result = notes.map(n => reverseMap[n] || n).join(' ');
            document.getElementById('numberResult').textContent = '翻译结果：\n' + result;
        }

        // ===================== 音乐智能分析 =====================
        function analyzeMusic() {
            // 获取所有输入的音符
            let staffText = document.getElementById('staffInput').value;
            let numberText = document.getElementById('numberInput').value;
            let allNotes = (staffText + ' ' + numberText).split(/\s+/).filter(n => n);
            
            if (allNotes.length === 0) {
                document.getElementById('analysisResult').textContent = '请先输入乐谱信息再分析！';
                return;
            }

            // 分析逻辑
            let uniqueNotes = [...new Set(allNotes)];
            let noteCount = allNotes.length;
            let uniqueCount = uniqueNotes.length;
            
            // 简单判断调式（C大调默认）
            let mode = 'C大调（自然大调）';
            if (uniqueNotes.includes('A4') || uniqueNotes.includes('6')) {
                mode = 'C大调 / A小调（关系调）';
            }

            // 节拍判断
            let beat = '4/4拍（常用节拍）';
            if (noteCount % 3 === 0) beat = '3/4拍（华尔兹节拍）';

            // 输出分析结果
            let result = `
📌 乐谱总音符数：${noteCount} 个
📌 不重复音符数：${uniqueCount} 个
📌 判断调式：${mode}
📌 判断节拍：${beat}
📌 适用乐器：钢琴、电子琴、吉他、小提琴等通用乐器
            `;
            document.getElementById('analysisResult').textContent = result;
        }

        // 清空函数
        function clearStaff() {
            document.getElementById('staffInput').value = '';
            document.getElementById('staffResult').textContent = '';
        }

        function clearNumber() {
            document.getElementById('numberInput').value = '';
            document.getElementById('numberResult').textContent = '';
        }
    </script>
</body>
</html>
