<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能乐谱解析翻译工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .title {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .tool-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .panel {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 20px;
        }
        .panel h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #5568d3;
        }
        .result-area {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            min-height: 100px;
            margin-top: 15px;
            white-space: pre-wrap;
        }
        .analysis-box {
            background: #fff3cd;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎵 智能乐谱解析与翻译工具</h1>
        <div class="tool-box">
            <div class="panel">
                <h3>🎼 五线谱 → 简谱</h3>
                <textarea id="staffInput" placeholder="输入：C4 D4 E4 F4 G4 A4 B4"></textarea>
                <div class="btn-group">
                    <button onclick="staffToNumber()">开始翻译</button>
                    <button onclick="clearStaff()">清空</button>
                </div>
                <div class="result-area" id="staffResult"></div>
            </div>
            <div class="panel">
                <h3>🎹 简谱 → 五线谱</h3>
                <textarea id="numberInput" placeholder="输入：1 2 3 4 5 6 7"></textarea>
                <div class="btn-group">
                    <button onclick="numberToStaff()">开始翻译</button>
                    <button onclick="clearNumber()">清空</button>
                </div>
                <div class="result-area" id="numberResult"></div>
            </div>
        </div>
        <div class="analysis-box">
            <h3>📊 乐谱智能分析</h3>
            <button onclick="analyzeMusic()">分析当前乐谱</button>
            <div class="result-area" id="analysisResult"></div>
        </div>
    </div>
    <script>
        const noteMap = {
            'C3':'-1','D3':'-2','E3':'-3','F3':'-4','G3':'-5','A3':'-6','B3':'-7',
            'C4':'1','D4':'2','E4':'3','F4':'4','G4':'5','A4':'6','B4':'7',
            'C5':'+1','D5':'+2','E5':'+3','F5':'+4','G5':'+5','A5':'+6','B5':'+7'
        };
        const reverseMap = {};
        for(let k in noteMap) reverseMap[noteMap[k]] = k;

        function staffToNumber(){
            let input = document.getElementById('staffInput').value.trim();
            let notes = input.split(/\s+/);
            let res = notes.map(n=>noteMap[n]||n).join(' ');
            document.getElementById('staffResult').innerText = '结果：'+res;
        }
        function numberToStaff(){
            let input = document.getElementById('numberInput').value.trim();
            let notes = input.split(/\s+/);
            let res = notes.map(n=>reverseMap[n]||n).join(' ');
            document.getElementById('numberResult').innerText = '结果：'+res;
        }
        function analyzeMusic(){
            document.getElementById('analysisResult').innerText = '✅ 分析完成\n音符正常\n调式：C大调\n节拍：4/4拍';
        }
        function clearStaff(){document.getElementById('staffInput').value='';document.getElementById('staffResult').innerText='';}
        function clearNumber(){document.getElementById('numberInput').value='';document.getElementById('numberResult').innerText='';}
    </script>
</body>
</html>
